name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: pw
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      # The browser download from cdn.playwright.dev intermittently stalls
      # mid-transfer on the runner, and this Playwright version has no
      # per-download timeout — a stuck socket hangs until the job ceiling.
      # Bound each attempt with `timeout` and retry on a fresh connection.
      # On a cache hit this just validates the existing browsers and exits.
      - name: Install Playwright browsers
        run: |
          for attempt in 1 2 3; do
            echo "Playwright browser install attempt $attempt"
            if timeout -k 10 300 npx playwright install chromium; then
              exit 0
            fi
            echo "Attempt $attempt stalled or failed; retrying after backoff..."
            sleep 5
          done
          echo "Playwright browser install failed after 3 attempts" >&2
          exit 1
        timeout-minutes: 15

      - name: Check formatting
        run: npm run fmt:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm test

      - name: Build
        run: npm run build
